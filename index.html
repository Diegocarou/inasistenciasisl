<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Santa Lucía – Gestión de Asistencia</title>
  <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistencia SL">
<meta name="theme-color" content="#1a2744">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --navy:#1a2744; --navy-light:#243259; --gold:#c9a84c; --cream:#f9f6f0; --gray:#6b7280; --gray-light:#e5e7eb; --red:#dc2626; --red-bg:#fee2e2; --green:#16a34a; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;}
header{background:var(--navy);color:#fff;padding:0 2rem;display:flex;align-items:center;height:68px;}
.hbrand{display:flex;align-items:center;gap:14px;}
.hlogo{width:42px;height:42px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);}
.htitle{font-family:'Playfair Display',serif;font-size:1.15rem;}
.layout{display:flex;min-height:calc(100vh - 68px);}
.sidebar{width:280px;background:#fff;border-right:1px solid var(--gray-light);overflow-y:auto;}
.main{flex:1;padding:2rem;overflow-y:auto;}
.tcard{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(26,39,68,.10);overflow:hidden;}
.thead, .trow{display:grid;grid-template-columns:1fr auto;padding:12px 20px;align-items:center; gap: 15px;}
.thead{background:#f1f4fb;font-size:.75rem;font-weight:600;color:var(--gray);text-transform:uppercase;}
.trow{border-bottom:1px solid var(--gray-light);}
.trow.absent-row{background-color:var(--red-bg);}
.cwrap input[type=checkbox]{display:none;}
.clbl{width:28px;height:28px;border:2px solid var(--gray-light);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cwrap input:checked + .clbl{background:var(--red);border-color:var(--red);color:white;}
.cwrap input:checked + .clbl::after{content:'✕';font-size:16px;}
.sel-espacio { padding: 8px; border-radius: 6px; border: 1px solid var(--gray-light); font-family: 'DM Sans'; font-size: 0.85rem; width: 140px; background: #fff; }
.sel-espacio.marcado { border-color: var(--red); color: var(--red); font-weight:600; background: var(--red-bg); }
.btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:var(--green);color:white;width:100%;}
.ditem{padding:12px 20px;cursor:pointer;border-left:4px solid transparent;}
.ditem.active{background:var(--cream);border-left-color:var(--navy);font-weight:600;}
.m-section{padding:15px; border-bottom:1px solid var(--gray-light);}
.m-label{font-size:0.7rem; font-weight:700; color:var(--gray); text-transform:uppercase; display:block; margin-bottom:5px;}
.m-select{width:100%; padding:10px; border-radius:8px; border:1px solid var(--gray-light);}

@media (max-width: 768px) {
.layout{flex-direction:column;}
.sidebar{width:100%; border-right:none; border-bottom:2px solid var(--navy);}
.main{padding:1rem;}
}
</style>
</head>
<body onload="iniciarSistema()">

<header>
<div class="hbrand">
<div class="hlogo">SL</div>
<div class="htitle">Instituto Santa Lucía</div>
</div>
</header>

<div class="layout">
<aside class="sidebar" id="sidebarMenu">
<div style="padding:20px; text-align:center;">Cargando...</div>
</aside>
<main class="main" id="mainArea" style="display:none;">
<h2 id="courseTitle" style="margin-bottom:1rem; font-family:'Playfair Display'; color:var(--navy);"></h2>
<div class="tcard">
<div id="studentList"></div>
</div>
<div style="margin-top:2rem;"><button class="btn" id="sendBtn" onclick="enviarInasistencias()">Confirmar y Enviar Avisos</button></div>
</main>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5_ReK3hg_jP15-CLUwepTLdp-3jPLommo0vltzl_Oa4_WyU7tGse1bglVOIykl-MSfg/exec";

let ALL_STUDENTS = [];
let configs = null;
let currentTurno = "";
let currentPreceptor = "";
let currentCourse = "";

async function iniciarSistema() {
try {
const [alRes, confRes] = await Promise.all([
fetch(SCRIPT_URL + "?action=getStudents"),
fetch(SCRIPT_URL + "?action=getConfig")
]);
ALL_STUDENTS = await alRes.json();
configs = await confRes.json();
renderSidebar();
} catch (e) { alert("Error de conexión."); }
}

function renderSidebar() {
const sidebar = document.getElementById('sidebarMenu');
sidebar.innerHTML = `
<div class="m-section">
<label class="m-label">1. TURNO</label>
<select onchange="cambiarTurno(this.value)" class="m-select">
<option value="">Seleccione...</option>
<option value="Mañana">Mañana</option>
<option value="Tarde">Tarde</option>
<option value="Contraturno">Contraturno</option>
</select>
</div>
<div id="secPreceptor" class="m-section" style="display:none;">
<label class="m-label">2. PRECEPTOR</label>
<select id="selPreceptor" onchange="cambiarPreceptor(this.value)" class="m-select"></select>
</div>
<div id="linksCursos"></div>
`;
}

function cambiarTurno(turno) {
currentTurno = turno;
document.getElementById('mainArea').style.display = 'none';
document.getElementById('linksCursos').innerHTML = '';
if(!turno) { document.getElementById('secPreceptor').style.display = 'none'; return; }

const lista = [...new Set(ALL_STUDENTS.filter(s => s.turno && s.turno.trim().toLowerCase() === turno.toLowerCase()).map(s => s.preceptor))].sort();
const sel = document.getElementById('selPreceptor');
sel.innerHTML = '<option value="">Seleccione...</option>' + lista.map(p => `<option value="${p}">${p}</option>`).join('');
document.getElementById('secPreceptor').style.display = 'block';
}

function cambiarPreceptor(precep) {
currentPreceptor = precep;
document.getElementById('mainArea').style.display = 'none';
if(!precep) { document.getElementById('linksCursos').innerHTML = ''; return; }

const cursos = [...new Set(ALL_STUDENTS.filter(s => s.preceptor === precep && s.turno.trim().toLowerCase() === currentTurno.toLowerCase()).map(s => s.curso))].sort();
document.getElementById('linksCursos').innerHTML = '<div style="padding:15px;" class="m-label">3. CURSOS</div>' +
cursos.map(c => `<div class="ditem" onclick="cargarCurso('${c}')">${c}</div>`).join('');
}

function cargarCurso(c) {
currentCourse = c;
document.getElementById('mainArea').style.display = 'block';
document.getElementById('courseTitle').innerText = c + " (" + currentTurno + ")";
document.querySelectorAll('.ditem').forEach(el => el.classList.toggle('active', el.innerText === c));

const alumnos = ALL_STUDENTS.filter(s => s.curso === c && s.preceptor === currentPreceptor && s.turno.trim().toLowerCase() === currentTurno.toLowerCase());
const esContra = (currentTurno.toLowerCase() === 'contraturno');

document.getElementById('studentList').innerHTML = alumnos.map(s => {
const id = String(s.id);
const ctrl = esContra
? `<select id="ctrl_${id}" class="sel-espacio" onchange="this.classList.toggle('marcado', this.value!==''); this.closest('.trow').classList.toggle('absent-row', this.value!=='')">
<option value="">Presente</option><option value="Educación Física">Ed. Física</option><option value="Formación Religiosa">F. Religiosa</option><option value="Informática">Informática</option>
</select>`
: `<label class="cwrap"><input type="checkbox" id="ctrl_${id}" onchange="this.closest('.trow').classList.toggle('absent-row', this.checked)"><div class="clbl"></div></label>`;
return `<div class="trow"><span>${s.apellido}, ${s.nombre}</span><div>${ctrl}</div></div>`;
}).join('');
}

async function enviarInasistencias() {
const alumnos = ALL_STUDENTS.filter(s => s.curso === currentCourse && s.preceptor === currentPreceptor && s.turno.trim().toLowerCase() === currentTurno.toLowerCase());
const esContra = (currentTurno.toLowerCase() === 'contraturno');
const queue = [];

alumnos.forEach(s => {
const el = document.getElementById(`ctrl_${String(s.id)}`);
const faltó = esContra ? (el.value !== "") : el.checked;
if(faltó) {
const espacio = esContra ? el.value : ("Turno " + currentTurno);
const temp = configs[esContra ? 'contraturno' : 'turno'];
const nombreC = s.apellido + ", " + s.nombre;
queue.push({
to: s.email,
subject: temp.subject.replace(/{{alumno}}/g, nombreC).replace(/{{espacio}}/g, espacio),
body: temp.body.replace(/{{alumno}}/g, nombreC).replace(/{{curso}}/g, s.curso).replace(/{{espacio}}/g, espacio).replace(/{{fecha}}/g, new Date().toLocaleDateString('es-AR')).replace(/{{preceptor}}/g, currentPreceptor),
datosRegistro: { alumno: nombreC, curso: s.curso, espacio: espacio, preceptor: currentPreceptor }
});
}
});

if(queue.length === 0) return alert("No hay marcados.");
if(!confirm("¿Enviar y registrar " + queue.length + " avisos?")) return;

const btn = document.getElementById('sendBtn');
btn.disabled = true; btn.innerText = "🚀 Enviando...";
try {
await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ queue }) });
alert("¡Éxito!");
cargarCurso(currentCourse);
} catch (e) { alert("Error."); }
finally { btn.disabled = false; btn.innerText = "Confirmar y Enviar Avisos"; }
}
</script>
</body>
</html>
