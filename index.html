<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Santa Lucía – Asistencia</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistencia SL">
<meta name="theme-color" content="#1a2744">
<link rel="manifest" href="manifest.json?v=3">
<link rel="apple-touch-icon" href="icon.png?v=3">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#1a2744; --gold:#c9a84c; --cream:#f9f6f0; --gray:#6b7280; --gray-light:#e5e7eb; --red:#dc2626; --red-bg:#fee2e2; --green:#16a34a; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;}
header{background:var(--navy);color:#fff;padding:0 2rem;display:flex;align-items:center;height:68px;}
.hlogo{width:42px;height:42px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);margin-right:12px;}
.layout{display:flex;min-height:calc(100vh - 68px);}
.sidebar{width:280px;background:#fff;border-right:1px solid var(--gray-light);}
.main{flex:1;padding:2rem;}
.tcard{background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
.trow{display:grid;grid-template-columns:1fr auto;padding:12px 20px;align-items:center;border-bottom:1px solid var(--gray-light);}
.absent-row{background-color:var(--red-bg);}

/* Contraturno Pills */
.ct-opts { display: flex; gap: 6px; }
.ct-opts input { display: none; }
.ct-opts span { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--gray-light); font-size: 0.7rem; font-weight: 700; background:#fff; cursor:pointer; }
.ct-opts input:checked + span { background: var(--red); color: white; border-color: var(--red); }

.cwrap input[type=checkbox]{display:none;}
.clbl{width:28px;height:28px;border:2px solid var(--gray-light);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cwrap input:checked + .clbl{background:var(--red);border-color:var(--red);color:white;}
.cwrap input:checked + .clbl::after{content:'✕';}

.btn{padding:14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;background:var(--navy);color:white;width:100%;font-size:1rem; transition: background 0.3s;}
.m-section{padding:15px; border-bottom:1px solid var(--gray-light);}
.m-label{font-size:0.7rem; font-weight:700; color:var(--gray); text-transform:uppercase; margin-bottom:5px; display:block;}
.m-select{width:100%; padding:10px; border-radius:8px; border:1px solid var(--gray-light);}
.ditem{padding:12px 20px;cursor:pointer;border-left:4px solid transparent;}
.ditem.active{background:var(--cream);border-left-color:var(--navy);font-weight:700;}

/* Pantallas Superpuestas (Login y Carga) */
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#loginOverlay { background:var(--navy); color:white; }
#loaderOverlay { background:rgba(255,255,255,0.9); z-index:8888; display:none; }

/* Animación de carga */
.spinner { width: 50px; height: 50px; border: 5px solid var(--gray-light); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

@media (max-width: 768px) { .layout{flex-direction:column;} .sidebar{width:100%;} .main{padding:1rem;} }
</style>
</head>
<body onload="verificarSesion()">

<div id="loginOverlay" class="overlay">
<div style="font-family:'Playfair Display'; font-size:2rem; margin-bottom:10px; display:flex; align-items:center;"><div class="hlogo" style="width:50px; height:50px;">SL</div> Instituto Santa Lucía</div>
<p style="margin-bottom:20px; opacity:0.8;">Acceso exclusivo para Preceptores</p>
<input type="password" id="pinInput" placeholder="PIN" style="padding:15px; text-align:center; font-size:1.5rem; border-radius:8px; border:none; outline:none; margin-bottom:20px; width:200px; font-weight:bold;">
<button class="btn" style="width:200px; background:var(--green);" onclick="ingresar()">Ingresar al Sistema</button>
</div>

<div id="loaderOverlay" class="overlay">
<div class="spinner"></div>
<p style="margin-top:20px; font-weight:700; color:var(--navy); font-size:1.1rem;">Conectando con el registro...</p>
</div>

<header><div class="hlogo">SL</div><div style="font-family:'Playfair Display';font-size:1.1rem;">Instituto Santa Lucía</div></header>

<div class="layout">
<aside class="sidebar">
<div class="m-section">
<label class="m-label">Turno</label>
<select onchange="cambiarTurno(this.value)" class="m-select" id="selTurno">
<option value="">Seleccione...</option>
<option value="Mañana">Mañana</option><option value="Tarde">Tarde</option><option value="Contraturno">Contraturno</option>
</select>
</div>
<div id="secPreceptor" class="m-section" style="display:none;">
<label class="m-label">Preceptor</label>
<select id="selPreceptor" onchange="cambiarPreceptor(this.value)" class="m-select"></select>
</div>
<div id="linksCursos"></div>
</aside>
<main class="main" id="mainArea" style="display:none;">
<h2 id="courseTitle" style="margin-bottom:1.5rem; color:var(--navy);"></h2>
<div class="tcard" id="studentList"></div>
<button class="btn" id="sendBtn" onclick="enviar()" style="margin-top:2rem;">Confirmar Asistencia (0 Faltas)</button>
</main>
</div>

<script>
// === REEMPLAZAR ESTA URL POR LA TUYA DE APPS SCRIPT ===
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5u3lvjtzu5viRl2MytBzG-00KbsVID6tTRASPZweWDLBqogJxS1RCT5XwpTMYydvPkA/exec";
// ======================================================

const PIN_SECRETO = "1234"; // Acá podés cambiar la clave de los preceptores

let ALL_STUDENTS = []; let configs = null;
let currentTurno = ""; let currentPreceptor = ""; let currentCourse = "";

function verificarSesion() {
if(sessionStorage.getItem('accesoPermitido') === 'true') {
document.getElementById('loginOverlay').style.display = 'none';
iniciar();
}
}

function ingresar() {
const input = document.getElementById('pinInput').value;
if(input === PIN_SECRETO) {
sessionStorage.setItem('accesoPermitido', 'true');
document.getElementById('loginOverlay').style.display = 'none';
iniciar();
} else {
alert("❌ PIN Incorrecto. Consulte con Jefatura.");
document.getElementById('pinInput').value = "";
}
}

async function iniciar() {
document.getElementById('loaderOverlay').style.display = 'flex'; // Mostrar carga
try {
const [al, co] = await Promise.all([fetch(SCRIPT_URL+"?action=getStudents"), fetch(SCRIPT_URL+"?action=getConfig")]);
ALL_STUDENTS = await al.json(); configs = await co.json();
ALL_STUDENTS.forEach((s, i) => { if(!s.id) s.id = "id_"+i; });
document.getElementById('loaderOverlay').style.display = 'none'; // Ocultar carga
} catch (error) {
alert("Error de conexión. Reintente recargando la página.");
document.getElementById('loaderOverlay').style.display = 'none';
}
}

function cambiarTurno(t) {
currentTurno = t; document.getElementById('secPreceptor').style.display = t ? 'block' : 'none';
document.getElementById('mainArea').style.display = 'none';
const lista = [...new Set(ALL_STUDENTS.filter(s => s.turno?.toLowerCase() === t.toLowerCase()).map(s => s.preceptor))].sort();
document.getElementById('selPreceptor').innerHTML = '<option value="">Seleccione...</option>' + lista.map(p => `<option value="${p}">${p}</option>`).join('');
}

function cambiarPreceptor(p) {
currentPreceptor = p; document.getElementById('mainArea').style.display = 'none';
const cursos = [...new Set(ALL_STUDENTS.filter(s => s.preceptor === p && s.turno?.toLowerCase() === currentTurno.toLowerCase()).map(s => s.curso))].sort();
document.getElementById('linksCursos').innerHTML = cursos.map(c => `<div class="ditem" onclick="cargarCurso('${c}')">${c}</div>`).join('');
}

function cargarCurso(c) {
currentCourse = c; document.getElementById('mainArea').style.display = 'block';
document.getElementById('courseTitle').innerText = c;
document.querySelectorAll('.ditem').forEach(el => el.classList.toggle('active', el.innerText === c));

// Verificación de Anti-Doble Envío
const fechaHoy = new Date().toLocaleDateString('es-AR');
const cacheKey = `enviado_${currentTurno}_${c}_${fechaHoy}`;

if(localStorage.getItem(cacheKey)) {
document.getElementById('studentList').innerHTML = `
<div style="padding:40px 20px; text-align:center;">
<div style="font-size:3rem; margin-bottom:10px;">✅</div>
<h3 style="color:var(--green); font-weight:700;">Asistencia enviada</h3>
<p style="color:var(--gray); margin-top:5px;">El reporte de este curso ya fue procesado y enviado a Jefatura en el día de hoy.</p>
</div>`;
document.getElementById('sendBtn').style.display = 'none';
return;
}

document.getElementById('sendBtn').style.display = 'block';
const alumnos = ALL_STUDENTS.filter(s => s.curso === c && s.preceptor === currentPreceptor && s.turno?.toLowerCase() === currentTurno.toLowerCase());
const esC = currentTurno.toLowerCase() === 'contraturno';

// Armado de la lista con la función onchange="actualizarContador()"
document.getElementById('studentList').innerHTML = alumnos.map(s => `
<div class="trow">
<span>${s.apellido}, ${s.nombre}</span>
<div>${esC ? `<div class="ct-opts" id="ctrl_${s.id}"><label><input type="checkbox" value="EF" onchange="actualizarContador()"><span>EF</span></label><label><input type="checkbox" value="FR" onchange="actualizarContador()"><span>FR</span></label><label><input type="checkbox" value="INF" onchange="actualizarContador()"><span>INF</span></label></div>` : `<label class="cwrap"><input type="checkbox" id="ctrl_${s.id}" onchange="this.closest('.trow').classList.toggle('absent-row', this.checked); actualizarContador();"><div class="clbl"></div></label>`}</div>
</div>`).join('');

actualizarContador();
}

function actualizarContador() {
const alumnos = ALL_STUDENTS.filter(s => s.curso === currentCourse && s.preceptor === currentPreceptor && s.turno?.toLowerCase() === currentTurno.toLowerCase());
const esC = currentTurno.toLowerCase() === 'contraturno';
let faltas = 0;

alumnos.forEach(s => {
if(esC) {
if(document.querySelectorAll(`#ctrl_${s.id} input:checked`).length > 0) faltas++;
} else {
if(document.getElementById(`ctrl_${s.id}`).checked) faltas++;
}
});

const btn = document.getElementById('sendBtn');
if(faltas === 0) {
btn.innerText = "Confirmar Asistencia (0 Faltas)";
btn.style.background = "var(--navy)";
} else {
btn.innerText = `Enviar ${faltas} Avisos de Inasistencia`;
btn.style.background = "var(--red)";
}
}

async function enviar() {
const alumnos = ALL_STUDENTS.filter(s => s.curso === currentCourse && s.preceptor === currentPreceptor && s.turno?.toLowerCase() === currentTurno.toLowerCase());
const esC = currentTurno.toLowerCase() === 'contraturno';
const queue = [];

alumnos.forEach(s => {
let f = false, esp = "";
if(esC) {
const cbs = document.querySelectorAll(`#ctrl_${s.id} input:checked`);
if(cbs.length > 0) { f = true; esp = Array.from(cbs).map(b => b.value).join(", "); }
} else {
f = document.getElementById(`ctrl_${s.id}`).checked;
if(f) esp = "Turno " + currentTurno;
}

if(f) {
const t = configs[esC ? 'contraturno' : 'turno'];
const nom = s.apellido + ", " + s.nombre;
queue.push({
to: s.email, subject: t.subject.replace(/{{alumno}}/g, nom).replace(/{{espacio}}/g, esp),
body: t.body.replace(/{{alumno}}/g, nom).replace(/{{curso}}/g, s.curso).replace(/{{espacio}}/g, esp).replace(/{{fecha}}/g, new Date().toLocaleDateString('es-AR')).replace(/{{preceptor}}/g, currentPreceptor),
datosRegistro: { alumno: nom, curso: s.curso, espacio: esp, preceptor: currentPreceptor }
});
}
});

let mensaje = queue.length === 0 ? "¿Confirmar asistencia PERFECTA (nadie faltó) y enviar reporte a Jefatura?" : `¿Enviar ${queue.length} avisos a familias y reporte a Jefatura?`;
if(!confirm(mensaje)) return;

const b = document.getElementById('sendBtn');
b.disabled = true;
b.innerText = "Procesando...";
b.style.background = "var(--navy)";

const resumen = { turno: currentTurno, curso: currentCourse, total: alumnos.length, ausentes: queue.length, presentes: alumnos.length - queue.length };

try {
await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ queue, resumen }) });

// Si sale todo bien, guardamos la marca para evitar doble envío hoy
const fechaHoy = new Date().toLocaleDateString('es-AR');
localStorage.setItem(`enviado_${currentTurno}_${currentCourse}_${fechaHoy}`, 'true');

alert("¡Reporte enviado exitosamente!");
cargarCurso(currentCourse); // Se vuelve a cargar para mostrar el cartel verde
} catch (e) { alert("Error de conexión al enviar."); }
finally { b.disabled = false; }
}
</script>
</body>
</html>
