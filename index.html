<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISL - Asistencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #2B326B; --gold: #C2A251; --red: #D82226; --bg: #F8FAFC; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1E293B; }
    
    /* Login Styles */
    #loginScreen { position: fixed; inset: 0; background: var(--navy); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .login-box { background: white; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .login-input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    .btn-login { background: var(--gold); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; }
    
    /* App Styles */
    header { background: var(--navy); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 60px); }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    .sidebar { background: white; padding: 25px; border-right: 1px solid #E2E8F0; }
    .main { padding: 30px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box;}
    
    .m-select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #CBD5E1; background: #F1F5F9; font-size: 14px; box-sizing: border-box; }
    .course-btn { padding: 12px 15px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-weight: 600; }
    .course-btn.active { background: var(--gold); color: white; }

    .student-card { background: white; padding: 16px 20px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #E2E8F0; }
    .student-card.is-absent { border-left: 6px solid var(--red); background: #FFF1F2; }

    .absent-toggle { position: relative; display: inline-block; width: 100px; height: 36px; }
    .absent-toggle input { display: none; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #E2E8F0; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #64748B; }
    .slider:before { content: 'PRESENTE'; }
    input:checked + .slider { background-color: var(--red); color: white; }
    input:checked + .slider:before { content: 'AUSENTE'; }

    .footer-actions { position: fixed; bottom: 0; right: 0; left: 0; padding: 20px; background: white; border-top: 1px solid #E2E8F0; display: flex; justify-content: flex-end; }
    @media (min-width: 769px) { .footer-actions { left: 320px; } }
    .btn-send { background: var(--navy); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2 style="color:var(--navy); margin-top:0">Instituto Santa Lucía</h2>
      <p style="color:#64748B; font-size:14px">Ingrese su correo institucional para continuar</p>
      <input type="email" id="emailInput" class="login-input" placeholder="usuario@isantalucia.edu.ar">
      <button class="btn-login" onclick="iniciarSesion()" id="loginBtn">Ingresar al Sistema</button>
      <p id="loginError" style="color:var(--red); font-size:13px; margin-top:10px;" class="hidden"></p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <div style="font-weight:700">SISTEMA DE ASISTENCIA</div>
      <div id="userLabel" style="font-size:12px; font-weight:600; color:var(--gold)"></div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <label>1: TURNO</label>
        <select id="selTurno" class="m-select" onchange="cambiarTurno()">
          <option value="">Seleccione...</option>
          <option value="Mañana">Mañana</option>
          <option value="Tarde">Tarde</option>
          <option value="Contraturno">Contraturno</option>
        </select>

        <label>2: PRECEPTOR</label>
        <select id="selPreceptor" class="m-select" onchange="cambiarPreceptor()"></select>

        <label>3: CURSO</label>
        <div id="listaCursos"></div>
      </aside>

      <main class="main">
        <h2 id="viewTitle">Bienvenido</h2>
        <div id="studentList"></div>
        <div style="height: 100px;"></div>
      </main>
    </div>

    <div id="footer" class="footer-actions hidden">
      <button id="sendBtn" class="btn-send" onclick="confirmarEnvio()">Confirmar Asistencia</button>
    </div>
  </div>

  <script>
    // IMPORTANTE: REEMPLAZA ESTA URL CON TU NUEVA URL DE GOOGLE APPS SCRIPT
    const API_URL = "https://script.google.com/macros/s/AKfycbzukEBsHdiyQDabAGGfWuhBE6CFdUySoKnq8cNy_7MDO2UoenyrOYc65AxVnGOldOFJxA/exec"; 
    
    let DATA = {};
    let state = { email: '', turno: '', preceptor: '', curso: '' };

    async function iniciarSesion() {
      const email = document.getElementById('emailInput').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      
      if(!email) return;

      btn.innerText = "Verificando...";
      btn.disabled = true;
      err.classList.add('hidden');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'login', email: email })
        });
        
        const res = await response.json();

        if (res.autorizado) {
          DATA = res;
          state.email = email;
          document.getElementById('userLabel').innerText = email;
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
        } else {
          err.innerText = res.error;
          err.classList.remove('hidden');
        }
      } catch (error) {
        err.innerText = "Error de conexión. Verifica la URL de la API.";
        err.classList.remove('hidden');
      } finally {
        btn.innerText = "Ingresar al Sistema";
        btn.disabled = false;
      }
    }

    // Lógica de UI (Mantenida igual)
    function cambiarTurno() {
      state.turno = document.getElementById('selTurno').value;
      const preceptores = [...new Set(DATA.students.filter(s => s.turno == state.turno).map(s => s.preceptor))].sort();
      document.getElementById('selPreceptor').innerHTML = '<option value="">Seleccione...</option>' + preceptores.map(p => `<option value="${p}">${p}</option>`).join('');
      document.getElementById('listaCursos').innerHTML = '';
      resetMain();
    }

    function cambiarPreceptor() {
      state.preceptor = document.getElementById('selPreceptor').value;
      const cursos = [...new Set(DATA.students.filter(s => s.turno == state.turno && s.preceptor == state.preceptor).map(s => s.curso))].sort();
      document.getElementById('listaCursos').innerHTML = cursos.map(c => `<div class="course-btn" onclick="cargarCurso('${c}', this)">${c}</div>`).join('');
      resetMain();
    }

    function cargarCurso(curso, el) {
      state.curso = curso;
      document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('viewTitle').innerText = curso;
      document.getElementById('footer').classList.remove('hidden');

      const alumnos = DATA.students.filter(s => s.turno == state.turno && s.curso == curso);
      document.getElementById('studentList').innerHTML = alumnos.map(s => `
        <div class="student-card" id="card_${s.id}">
          <div style="font-weight:600">${s.apellido}, ${s.nombre}</div>
          <label class="absent-toggle">
            <input type="checkbox" class="check-absent" data-email="${s.email_responsable}" data-name="${s.apellido} ${s.nombre}" onchange="document.getElementById('card_${s.id}').classList.toggle('is-absent', this.checked)">
            <div class="slider"></div>
          </label>
        </div>
      `).join('');
    }

    async function confirmarEnvio() {
      const ausentes = document.querySelectorAll('.check-absent:checked');
      if (!confirm(`¿Confirmar asistencia? Se enviarán ${ausentes.length} avisos.`)) return;

      const queue = [];
      const config = state.turno === 'Contraturno' ? DATA.config.contraturno : DATA.config.turno;
      ausentes.forEach(a => {
        queue.push({
          to: a.dataset.email,
          subject: config.subject.replace('{{alumno}}', a.dataset.name),
          body: config.body.replace('{{alumno}}', a.dataset.name).replace('{{fecha}}', new Date().toLocaleDateString())
        });
      });

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.innerText = "Procesando...";

      try {
        const payload = { queue: queue, resumen: { curso: state.curso, turno: state.turno, total: document.querySelectorAll('.check-absent').length } };
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'enviar', email: state.email, payload: payload })
        });
        const res = await response.json();
        
        if(res.success) {
            alert("Asistencia registrada con éxito.");
            location.reload();
        } else {
            alert("Error al guardar: " + res.error);
            btn.disabled = false;
            btn.innerText = "Confirmar Asistencia";
        }
      } catch (error) {
        alert("Error de conexión al enviar.");
        btn.disabled = false;
        btn.innerText = "Confirmar Asistencia";
      }
    }

    function resetMain() { document.getElementById('studentList').innerHTML = ''; document.getElementById('footer').classList.add('hidden'); document.getElementById('viewTitle').innerText = 'Bienvenido'; }
  </script>
</body>
</html>
