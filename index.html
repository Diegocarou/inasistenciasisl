<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Santa Lucía – Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--navy:#1a2744; --navy-light:#243259; --gold:#c9a84c; --cream:#f9f6f0;
--gray:#6b7280; --gray-light:#e5e7eb; --red:#dc2626; --red-bg:#fee2e2; --green:#16a34a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;}
header{background:var(--navy);color:#fff;padding:0 2rem;display:flex;align-items:center;height:68px;}
.hbrand{display:flex;align-items:center;gap:14px;}
.hlogo{width:42px;height:42px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);}
.htitle{font-family:'Playfair Display',serif;font-size:1.15rem;}
.layout{display:flex;min-height:calc(100vh - 68px);}
.sidebar{width:280px;background:#fff;border-right:1px solid var(--gray-light);overflow-y:auto;}
.main{flex:1;padding:2rem;overflow-y:auto;}
.tcard{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(26,39,68,.10);overflow:hidden;}
.thead, .trow{display:grid;grid-template-columns:50px 1fr 150px 200px 80px;padding:12px 20px;align-items:center;}
.thead{background:#f1f4fb;font-size:.75rem;font-weight:600;color:var(--gray);text-transform:uppercase;}
.trow{border-bottom:1px solid var(--gray-light);}
.trow.absent-row{background-color:var(--red-bg);}
.cwrap input[type=checkbox]{display:none;}
.clbl{width:24px;height:24px;border:2px solid var(--gray-light);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cwrap input:checked + .clbl{background:var(--red);border-color:var(--red);color:white;}
.cwrap input:checked + .clbl::after{content:'✕';font-size:14px;}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-family:'DM Sans';}
.bgrn{background:var(--green);color:white;}
.bgrn:disabled{opacity:0.5;cursor:not-allowed;}
.ditem{padding:12px 20px;cursor:pointer;border-left:4px solid transparent;}
.ditem:hover{background:var(--cream);}
.ditem.active{background:var(--cream);border-left-color:var(--navy);font-weight:600;}
</style>
</head>
<body onload="iniciarSistema()">

<header>
<div class="hbrand">
<div class="hlogo">SL</div>
<div>
<div class="htitle">Instituto Santa Lucía</div>
<div style="font-size:0.8rem; opacity:0.8;">Gestión de Asistencia</div>
</div>
</div>
</header>

<div class="layout">
<aside class="sidebar" id="sidebarMenu">
<div style="padding:20px; text-align:center;">Cargando sistema...</div>
</aside>
<main class="main" id="mainArea" style="display:none;">
<h2 id="courseTitle" style="font-family:'Playfair Display'; margin-bottom:1rem; color:var(--navy);"></h2>
<div class="tcard">
<div class="thead">
<span>#</span><span>Alumno</span><span>DNI</span><span>Email Familia</span><span>Faltó</span>
</div>
<div id="studentList"></div>
</div>
<div style="margin-top: 2rem; text-align: right;">
<button class="btn bgrn" id="sendBtn" onclick="enviarInasistencias()">Confirmar y Enviar Avisos</button>
</div>
</main>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZEgvhdehjWLABe8sLGxPzjRm-gd6emNcC2nXvesrIrjap5T5YV5kGTvXRmfofggqVCA/exec";

let ALL_STUDENTS = [];
let templateData = null;
let currentPreceptor = "";
let currentCourse = "";
let absentees = new Set();

async function iniciarSistema() {
try {
const [alumnosRes, configRes] = await Promise.all([
fetch(SCRIPT_URL + "?action=getStudents"),
fetch(SCRIPT_URL + "?action=getConfig")
]);
ALL_STUDENTS = await alumnosRes.json();
templateData = await configRes.json();
const preceptores = [...new Set(ALL_STUDENTS.map(s => s.preceptor))].filter(Boolean).sort();
mostrarSelectorPreceptor(preceptores);
} catch (error) {
document.getElementById('sidebarMenu').innerHTML = '<div style="padding:20px; color:red;">Error de conexión.</div>';
}
}

function mostrarSelectorPreceptor(lista) {
const sidebar = document.getElementById('sidebarMenu');
sidebar.innerHTML = `
<div style="padding: 1.5rem; border-bottom: 1px solid var(--gray-light);">
<label style="font-size: 0.7rem; font-weight: 700; color: var(--gray); text-transform: uppercase; margin-bottom: 10px; display: block;">Identificación</label>
<select onchange="filtrarPorPreceptor(this.value)" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--gray-light);">
<option value="">Seleccione su nombre...</option>
\${lista.map(p => \`<option value="\${p}">\${p}</option>\`).join('')}
</select>
</div>
<div id="divisionLinks"></div>
`;
}

function filtrarPorPreceptor(nombre) {
currentPreceptor = nombre;
document.getElementById('mainArea').style.display = 'none';
if(!nombre) return;
const misAlumnos = ALL_STUDENTS.filter(s => s.preceptor === nombre);
const misDivisiones = [...new Set(misAlumnos.map(s => s.curso))].sort();
const container = document.getElementById('divisionLinks');
container.innerHTML = '<p style="padding: 15px; font-size: 12px; color: gray;">MIS CURSOS</p>';
misDivisiones.forEach(curso => {
const div = document.createElement('div');
div.className = "ditem";
div.innerHTML = \`<span>\${curso}</span>\`;
div.onclick = (e) => {
document.querySelectorAll('.ditem').forEach(el => el.classList.remove('active'));
e.currentTarget.classList.add('active');
cargarCurso(curso, misAlumnos);
};
container.appendChild(div);
});
}

function cargarCurso(nombreCurso, todosMisAlumnos) {
currentCourse = nombreCurso;
document.getElementById('mainArea').style.display = 'block';
document.getElementById('courseTitle').innerText = \`Curso: \${nombreCurso}\`;
const alumnosDelCurso = todosMisAlumnos.filter(s => s.curso === nombreCurso);

const listHTML = alumnosDelCurso.map((s, index) => {
const idStr = String(s.id); // Forzamos ID a texto
return \`
<div class="trow \${absentees.has(idStr) ? 'absent-row' : ''}">
<span>\${index + 1}</span>
<span style="font-weight:500;">\${s.nombre}</span>
<span style="font-size:0.85rem; color:gray;">\${s.dni}</span>
<span style="font-size:0.85rem; color:gray;">\${s.email}</span>
<div>
<label class="cwrap">
<input type="checkbox" \${absentees.has(idStr) ? 'checked' : ''} onchange="toggleAbsent('\${idStr}')">
<div class="clbl"></div>
</label>
</div>
</div>\`;
}).join('');
document.getElementById('studentList').innerHTML = listHTML;
}

function toggleAbsent(id) {
const idStr = String(id);
if (absentees.has(idStr)) absentees.delete(idStr);
else absentees.add(idStr);
const misAlumnos = ALL_STUDENTS.filter(s => s.preceptor === currentPreceptor);
cargarCurso(currentCourse, misAlumnos);
}

function renderMessage(templateStr, data) {
return templateStr
.replace(/{{alumno}}/g, data.nombre)
.replace(/{{curso}}/g, data.curso)
.replace(/{{fecha}}/g, new Date().toLocaleDateString('es-AR'))
.replace(/{{preceptor}}/g, currentPreceptor);
}

async function enviarInasistencias() {
if (absentees.size === 0) return alert("No hay alumnos marcados.");
const confirmacion = confirm(\`¿Enviar aviso a las familias de los \${absentees.size} alumnos marcados?\`);
if (!confirmacion) return;
const btn = document.getElementById('sendBtn');
btn.disabled = true;
btn.innerText = "🚀 Enviando...";
const queue = [];
ALL_STUDENTS.forEach(s => {
if (absentees.has(String(s.id))) {
queue.push({
to: s.email,
subject: renderMessage(templateData.subject, s),
body: renderMessage(templateData.body, s)
});
}
});
try {
await fetch(SCRIPT_URL, {
method: 'POST',
mode: 'no-cors',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ queue: queue })
});
alert(\`¡Éxito! Se enviaron \${queue.length} correos.\`);
absentees.clear();
filtrarPorPreceptor(currentPreceptor);
} catch (error) {
alert("Error al enviar.");
} finally {
btn.disabled = false;
btn.innerText = "Confirmar y Enviar Avisos";
}
}
</script>
</body>
</html>
