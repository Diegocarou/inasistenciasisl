<!DOCTYPE html>
<html>
<head>
<base target="_top">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --navy: #2B326B; --gold: #C2A251; --red: #D82226; --bg: #F8FAFC; --text: #1E293B; --muted: #64748B; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
.overlay { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--navy); color: white; text-align: center; }
.hidden { display: none !important; }
header { background: var(--navy); color: white; padding: 12px 5%; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; }
.header-logo { width: 45px; height: auto; }
.layout { display: flex; max-width: 1400px; margin: 0 auto; }
.sidebar { width: 300px; background: white; border-right: 1px solid #E2E8F0; padding: 25px 20px; min-height: 100vh; }
.main { flex: 1; padding: 30px 5%; }
.m-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
.m-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #CBD5E1; background: #F1F5F9; font-size: 0.9rem; margin-bottom: 20px; }
.ditem { padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; }
.ditem.active { background: var(--navy); color: white; }
.tcard { background: white; border-radius: 12px; border: 1px solid #E2E8F0; overflow: hidden; }
.trow { display: grid; grid-template-columns: 1fr auto; padding: 15px 25px; align-items: center; border-bottom: 1px solid #F1F5F9; }
.absent-row { background-color: #FEE2E2 !important; color: var(--red); font-weight: 700; }
.clbl { padding: 8px 20px; border-radius: 6px; border: 1.5px solid #CBD5E1; cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; min-width: 100px; text-align: center; display: inline-block; }
.clbl::before { content: 'Presente'; }
input[type="checkbox"] { display: none; }
input:checked + .clbl { background: var(--red); border-color: var(--red); color: white; }
input:checked + .clbl::before { content: 'Ausente'; }
.ct-opts { display: flex; gap: 8px; }
.ct-opts span { padding: 8px 12px; border-radius: 6px; border: 1.5px solid #CBD5E1; font-size: 0.75rem; font-weight: 700; cursor: pointer; background: white; }
.ct-opts input:checked + span { background: var(--red); color: white; border-color: var(--red); }
.btn-send { width: 100%; padding: 18px; border-radius: 10px; border: none; background: var(--navy); color: white; font-weight: 700; cursor: pointer; margin-top: 30px; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loader" class="overlay"><div class="spinner"></div><p style="margin-top:20px;">Verificando acceso institucional...</p></div>
<div id="app" class="hidden">
<header>
<div class="header-brand">
<img src="https://i.ibb.co/vzY3qWb/logo-isl.png" class="header-logo">
<div><h1 style="font-family:'Playfair Display'; margin:0; font-size: 1.4rem;">Instituto Santa Lucía</h1><p style="margin:0; font-size: 0.6rem; text-transform: uppercase; color: var(--gold);">Gestión de Inasistencias</p></div>
</div>
<div id="userLabel" style="font-size: 0.7rem; color: var(--gold); font-weight: 600;"></div>
</header>
<div class="layout">
<aside class="sidebar">
<label class="m-label">Turno</label>
<select id="selTurno" onchange="cambiarTurno(this.value)" class="m-select">
<option value="">Seleccione...</option><option value="Mañana">Mañana</option><option value="Tarde">Tarde</option><option value="Contraturno">Contraturno</option>
</select>
<div id="secPreceptor" style="display:none;"><label class="m-label">Preceptor</label><select id="selPreceptor" onchange="cambiarPreceptor(this.value)" class="m-select"></select></div>
<div id="linksCursos"></div>
</aside>
<main class="main" id="mainArea" style="display:none;">
<h2 id="courseTitle" style="margin-bottom:20px; color:var(--navy);"></h2>
<div class="tcard"><div id="studentList"></div></div>
<button class="btn-send" id="sendBtn" onclick="enviar()">Confirmar Asistencia</button>
</main>
</div>
</div>
<script>
let ALL_STUDENTS = []; let configs = null;
let currentTurno = ""; let currentPreceptor = ""; let currentCourse = "";

window.onload = () => { google.script.run.withSuccessHandler(validarAcceso).verificarAcceso(); };

function validarAcceso(res) {
if (res.autorizado) {
document.getElementById('userLabel').innerText = res.email;
google.script.run.withSuccessHandler(s => {
ALL_STUDENTS = s;
google.script.run.withSuccessHandler(c => {
configs = c; document.getElementById('loader').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
}).getConfig();
}).getStudents();
} else {
document.getElementById('loader').innerHTML = `<h2 style="color:var(--gold)">Acceso Denegado</h2><p>${res.email}</p>`;
}
}

function cambiarTurno(t) {
currentTurno = t; document.getElementById('secPreceptor').style.display = t ? 'block' : 'none';
const lista = [...new Set(ALL_STUDENTS.filter(s => s.turno && s.turno.toString().trim().toLowerCase() === t.toLowerCase()).map(s => s.preceptor))].sort();
document.getElementById('selPreceptor').innerHTML = '<option value="">Seleccione...</option>' + lista.map(p => `<option value="${p}">${p}</option>`).join('');
}

function cambiarPreceptor(p) {
currentPreceptor = p;
const cursos = [...new Set(ALL_STUDENTS.filter(s => s.preceptor === p && s.turno.toString().trim().toLowerCase() === currentTurno.toLowerCase()).map(s => s.curso))].sort();
document.getElementById('linksCursos').innerHTML = cursos.map(c => `<div class="ditem" onclick="cargarCurso('${c}')">${c}</div>`).join('');
}

function cargarCurso(c) {
currentCourse = c; document.getElementById('mainArea').style.display = 'block';
document.getElementById('courseTitle').innerText = c;
const alumnos = ALL_STUDENTS.filter(s => s.curso === c && s.preceptor === currentPreceptor && s.turno.toString().trim().toLowerCase() === currentTurno.toLowerCase());
const esC = currentTurno.toLowerCase() === 'contraturno';
document.getElementById('studentList').innerHTML = alumnos.map(s => `
<div class="trow">
<span>${s.apellido}, ${s.nombre}</span>
<div>${esC ? `<div class="ct-opts" id="ctrl_${s.id}"><label><input type="checkbox"><span>EF</span></label><label><input type="checkbox"><span>FR</span></label><label><input type="checkbox"><span>INF</span></label></div>` :
`<label class="cwrap"><input type="checkbox" id="ctrl_${s.id}" onchange="this.closest('.trow').classList.toggle('absent-row', this.checked); actualizarContador();"><div class="clbl"></div></label>`}</div>
</div>`).join('');
actualizarContador();
}

function actualizarContador() {
let faltas = 0; const esC = currentTurno.toLowerCase() === 'contraturno';
document.querySelectorAll('[id^="ctrl_"]').forEach(el => {
if(esC) { if(el.querySelectorAll('input:checked').length > 0) faltas++; } else { if(el.checked) faltas++; }
});
const btn = document.getElementById('sendBtn');
btn.innerText = faltas === 0 ? "Confirmar Asistencia Perfecta" : `Enviar ${faltas} Avisos de Inasistencia`;
btn.style.background = faltas === 0 ? "var(--navy)" : "var(--red)";
}

function enviar() {
const alumnos = ALL_STUDENTS.filter(s => s.curso === currentCourse && s.turno.toString().trim().toLowerCase() === currentTurno.toLowerCase());
const esC = currentTurno.toLowerCase() === 'contraturno';
const queue = [];
alumnos.forEach(s => {
let ausente = false, esp = "";
if(esC) {
const checks = document.querySelectorAll(`#ctrl_${s.id} input:checked`);
if(checks.length > 0) { ausente = true; esp = Array.from(checks).map(b => b.nextElementSibling.innerText).join(", "); }
} else {
ausente = document.getElementById(`ctrl_${s.id}`).checked; esp = "Turno " + currentTurno;
}
if(ausente) {
const t = configs[esC ? 'contraturno' : 'turno'];
const nom = s.apellido + ", " + s.nombre;
queue.push({
to: s.email, subject: t.subject.replace(/{{alumno}}/g, nom).replace(/{{espacio}}/g, esp),
body: t.body.replace(/{{alumno}}/g, nom).replace(/{{curso}}/g, s.curso).replace(/{{espacio}}/g, esp).replace(/{{fecha}}/g, new Date().toLocaleDateString()).replace(/{{preceptor}}/g, currentPreceptor)
});
}
});
if(!confirm(`¿Enviar ${queue.length} avisos?`)) return;
document.getElementById('sendBtn').disabled = true;
google.script.run.withSuccessHandler(() => { alert("¡Enviado!"); location.reload(); }).procesarEnvio({ queue, resumen: { curso: currentCourse, turno: currentTurno, ausentes: queue.length, total: alumnos.length } });
}
</script>
</body>
</html>
